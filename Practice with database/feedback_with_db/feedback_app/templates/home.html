<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <style>
        body {
            font-family: Segoe UI, Tahoma, sans-serif;
            background: #f4f7fb;
            margin: 0;
            padding: 24px;
            color: #1f2937;
        }
        .card {
            max-width: 900px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
        }
        h1, h2 {
            margin-top: 0;
        }
        .btn {
            display: inline-block;
            background: #2563eb;
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 8px 14px;
            cursor: pointer;
            font-size: 14px;
            margin-right: 8px;
        }
        .btn:hover {
            background: #1d4ed8;
        }
        .btn-danger {
            background: #dc2626;
        }
        .btn-danger:hover {
            background: #b91c1c;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 14px;
        }
        th, td {
            border: 1px solid #d1d5db;
            padding: 10px;
            text-align: left;
        }
        th {
            background: #eff6ff;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1><u>HOME:</u></h1>
        <button class="btn" onclick="window.location.href='/add_student/'">Add Student</button>

        <h2>Student Table:</h2>
        <table>
            <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Department</th>
                <th>Year</th>
                <th>Actions</th>
            </tr>
            {% for student in students %}
            <tr>
                <td>{{ student.name }}</td>
                <td>{{ student.email }}</td>
                <td>{{ student.phone }}</td>
                <td>{{ student.department }}</td>
                <td>{{ student.year }}</td>
                <td>
                    <button class="btn" onclick="window.location.href='/edit_student/{{ student.id }}/'">Edit</button>
                    <button class="btn btn-danger" onclick="window.location.href='/delete_student/{{ student.id }}/'">Delete</button>
                </td>
            </tr>
            {% endfor %}
        </table>
    </div>
</body>
</html>
