<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Student</title>
    <style>
        body {
            font-family: Segoe UI, Tahoma, sans-serif;
            background: #f4f7fb;
            margin: 0;
            padding: 24px;
            color: #1f2937;
        }
        .card {
            max-width: 520px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
        }
        h1 {
            margin-top: 0;
        }
        label {
            display: block;
            margin-top: 12px;
            margin-bottom: 6px;
            font-weight: 600;
        }
        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
        }
        .btn {
            margin-top: 16px;
            background: #2563eb;
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 10px 16px;
            cursor: pointer;
            font-size: 14px;
        }
        .btn:hover {
            background: #1d4ed8;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Edit Student:</h1>
        <form method="POST">
            {% csrf_token %}

            <label for="name">Name:</label>
            <input type="text" id="name" name="name" value="{{ student.name }}" required>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" value="{{ student.email }}" required>

            <label for="phone">Phone:</label>
            <input type="text" id="phone" name="phone" value="{{ student.phone }}" required>

            <label for="department">Department:</label>
            <select id="department" name="department" required>
                <option value="CSE" {% if student.department == "CSE" %}selected{% endif %}>Computer Science</option>
                <option value="EEE" {% if student.department == "EEE" %}selected{% endif %}>Electrical Engineering</option>
                <option value="ME" {% if student.department == "ME" %}selected{% endif %}>Mechanical Engineering</option>
                <option value="CE" {% if student.department == "CE" %}selected{% endif %}>Civil Engineering</option>
                <option value="ECE" {% if student.department == "ECE" %}selected{% endif %}>Electronics and Communication</option>
                <option value="Fine Arts" {% if student.department == "Fine Arts" %}selected{% endif %}>Fine Arts</option>
            </select>

            <label for="year">Year:</label>
            <select id="year" name="year" required>
                <option value="1st Year" {% if student.year == "1st Year" %}selected{% endif %}>1st Year</option>
                <option value="2nd Year" {% if student.year == "2nd Year" %}selected{% endif %}>2nd Year</option>
                <option value="3rd Year" {% if student.year == "3rd Year" %}selected{% endif %}>3rd Year</option>
                <option value="4th Year" {% if student.year == "4th Year" %}selected{% endif %}>4th Year</option>
            </select>

            <button class="btn" type="submit">Update</button>
        </form>
    </div>
</body>
</html>
